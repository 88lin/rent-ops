<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>租房地图</title>
<script>
window._AMapSecurityConfig = { securityJsCode: 'bb2785b7b4e6c884a1051a3da144f6d9' };
</script>
<script src="https://webapi.amap.com/maps?v=2.0&key=457df6be93afc3d45a89c337ca5a4818&plugin=AMap.InfoWindow,AMap.Scale,AMap.ToolBar,AMap.PlaceSearch,AMap.Geocoder"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif; }

  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    background: rgba(20,20,22,0.92);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    padding: 12px 20px; display: flex; align-items: center; gap: 16px;
  }
  #header h1 { font-size: 16px; font-weight: 600; color: #fff; white-space: nowrap; }
  #header p  { font-size: 12px; color: #888; }
  #count-pill {
    margin-left: auto; background: #0071e3; color: #fff;
    font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 20px; white-space: nowrap;
  }

  #filters {
    position: fixed; top: 56px; left: 0; right: 0; z-index: 200;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    padding: 8px 16px; display: flex; gap: 6px; flex-wrap: nowrap; overflow-x: auto;
    border-bottom: 1px solid rgba(0,0,0,0.08);
  }
  #filters::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0; padding: 5px 12px; border-radius: 20px;
    border: 1px solid #d2d2d7; background: #fff;
    cursor: pointer; font-size: 12px; font-weight: 500;
    transition: all 0.15s; color: #333;
  }
  .chip:hover { border-color: #999; }
  .chip.active { border-color: transparent; color: #fff; background: #1d1d1f; }

  #map { position: fixed; top: 0; left: 0; right: 0; bottom: 0; }

  #panel {
    position: fixed; right: 0; top: 0; bottom: 0; width: 340px; z-index: 300;
    background: #fff; box-shadow: -4px 0 24px rgba(0,0,0,0.12);
    transform: translateX(100%);
    transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex; flex-direction: column; overflow: hidden;
  }
  #panel.open { transform: translateX(0); }
  #panel-close {
    position: absolute; top: 14px; right: 14px;
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(0,0,0,0.06); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: #555;
  }
  #panel-close:hover { background: rgba(0,0,0,0.12); }
  #panel-body { padding: 24px 20px 20px; overflow-y: auto; flex: 1; }

  .panel-badge {
    display: inline-block; font-size: 11px; font-weight: 600;
    padding: 3px 8px; border-radius: 6px; margin-bottom: 10px;
  }
  .pb-安居客 { background: #fff3e0; color: #e65100; }
  .pb-房天下 { background: #e8f5e9; color: #2e7d32; }
  .pb-小红书 { background: #fce4ec; color: #c62828; }
  .pb-豆瓣   { background: #e8eaf6; color: #283593; }
  .pb-贝壳   { background: #e3f2fd; color: #1565c0; }
  .pb-58     { background: #fff9c4; color: #f57f17; }
  .pb-自如   { background: #f3e5f5; color: #6a1b9a; }

  .panel-rec {
    display: inline-flex; font-size: 11px; background: #0071e3; color: #fff;
    padding: 3px 8px; border-radius: 6px; margin-bottom: 10px; margin-left: 4px;
  }
  .panel-name { font-size: 20px; font-weight: 700; color: #1d1d1f; line-height: 1.2; margin-bottom: 4px; }
  .panel-price { font-size: 30px; font-weight: 700; color: #1d1d1f; margin: 8px 0; }
  .panel-price .unit { font-size: 14px; color: #86868b; font-weight: 400; }
  .panel-tba { font-size: 20px; color: #86868b; margin: 8px 0; }
  .panel-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .ptag { font-size: 12px; padding: 3px 9px; border-radius: 6px; background: #f5f5f7; color: #515154; }
  .ptag.direct { background: #e8f5e9; color: #1b5e20; font-weight: 600; }
  .panel-desc { font-size: 13px; color: #515154; line-height: 1.6; margin-bottom: 14px; word-break: break-all; }
  .panel-dist { font-size: 12px; color: #86868b; margin-bottom: 16px; }
  .panel-dist b { color: #0071e3; }
  .panel-btn {
    display: block; text-align: center; padding: 12px;
    background: #0071e3; color: #fff; border-radius: 10px;
    font-size: 14px; font-weight: 600; text-decoration: none;
  }
  .panel-btn:hover { background: #005bb5; }
  .panel-btn.disabled { background: #f5f5f7; color: #86868b; pointer-events: none; }

  .m-dot {
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-weight: 700; cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    border: 2px solid #fff; transition: transform 0.15s; white-space: nowrap;
  }
  .m-dot:hover { transform: scale(1.15); }
  .m-dot.big { width: 36px; height: 36px; font-size: 11px; border-width: 3px; }
  .m-dot.sm  { width: 28px; height: 28px; font-size: 10px; }

  .work-wrap { position: relative; display: flex; align-items: center; justify-content: center; }
  .work-pulse {
    position: absolute; border-radius: 50%; opacity: 0;
    animation: ripple 2s ease-out infinite;
  }
  @keyframes ripple {
    0%   { width:20px; height:20px; opacity:0.6; background:rgba(255,59,48,0.5); }
    100% { width:56px; height:56px; opacity:0; background:rgba(255,59,48,0); }
  }
  .work-core {
    width: 36px; height: 36px; border-radius: 50%;
    background: #ff3b30; border: 3px solid #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; box-shadow: 0 2px 8px rgba(255,59,48,0.5); z-index: 1;
  }

  #legend {
    position: fixed; left: 16px; bottom: 36px; z-index: 200;
    background: rgba(255,255,255,0.95); backdrop-filter: blur(8px);
    border-radius: 12px; padding: 12px 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.12); font-size: 12px;
    max-height: 60vh; overflow-y: auto;
  }
  .leg-row { display: flex; align-items: center; gap: 7px; line-height: 1.9; color: #333; }
  .leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .leg-hint { font-size: 11px; color: #999; margin-top: 6px; border-top: 1px solid #f0f0f0; padding-top: 6px; }

  #geo-status {
    position: fixed; bottom: 12px; right: 16px; z-index: 200;
    font-size: 11px; color: #86868b; background: rgba(255,255,255,0.9);
    padding: 4px 10px; border-radius: 8px;
  }

  #setup-banner {
    position: fixed; inset: 0; z-index: 500;
    background: #f5f5f7; display: flex; align-items: center; justify-content: center;
    flex-direction: column; padding: 40px; text-align: center;
  }
  #setup-banner h2 { font-size: 22px; margin-bottom: 12px; color: #1d1d1f; }
  #setup-banner p { color: #515154; max-width: 520px; line-height: 1.5; margin-bottom: 16px; }
  #setup-banner code { background: #1d1d1f; color: #fff; padding: 8px 14px; border-radius: 6px; font-family: ui-monospace, Menlo, monospace; font-size: 13px; }
</style>
</head>
<body>

<div id="setup-banner" style="display:none">
  <h2>⚠ 缺少 city-runtime.json</h2>
  <p>地图需要城市配置文件才能渲染。在项目根目录执行：</p>
  <code>python3 scripts/build_city_runtime.py</code>
  <p style="margin-top:18px; font-size:12px">运行后刷新本页即可。配置来自 <code style="color:#0071e3;background:#e8f0fe;padding:2px 6px">config/profile.yml</code> 的 city 字段 + <code style="color:#0071e3;background:#e8f0fe;padding:2px 6px">cities/{pinyin}.yml</code>。</p>
</div>

<div id="header">
  <div>
    <h1 id="title">租房地图</h1>
    <p id="subtitle">加载中…</p>
  </div>
  <div id="count-pill">-- 套</div>
</div>

<div id="filters"></div>

<div id="map"></div>

<div id="panel">
  <button id="panel-close" onclick="closePanel()">✕</button>
  <div id="panel-body"></div>
</div>

<div id="legend">
  <div id="legend-rows"></div>
  <div class="leg-hint">数字 = 月租(千元) · 大圈 = 有价格</div>
</div>

<div id="geo-status"></div>

<script>
// ────────────── 颜色调色板 ──────────────
const DEFAULT_PALETTE = [
  '#0071e3', '#34a853', '#f5a623', '#9b59b6', '#00bcd4',
  '#795548', '#ff5722', '#00897b', '#a78bfa', '#ec407a',
  '#26a69a', '#ef5350', '#7e57c2', '#5c6bc0', '#66bb6a',
];
function pickColor(i) { return DEFAULT_PALETTE[i % DEFAULT_PALETTE.length]; }

// ────────────── 全局状态 ──────────────
let RUNTIME = null;           // 从 city-runtime.json 读
let WORK = null;              // [lng, lat] — 工作地坐标
let map = null;
let placeSearch = null;
let geocoder = null;
const markerObjs = [];

function distKm(p1, p2) {
  const R = 6371, dLat = (p2[1]-p1[1])*Math.PI/180, dLng = (p2[0]-p1[0])*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(p1[1]*Math.PI/180)*Math.cos(p2[1]*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ────────────── 入口 ──────────────
async function boot() {
  // 读 runtime
  try {
    const r = await fetch('city-runtime.json');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    RUNTIME = await r.json();
  } catch (e) {
    document.getElementById('setup-banner').style.display = 'flex';
    console.warn('加载 city-runtime.json 失败:', e);
    return;
  }

  // 给 areas 里没有 color 的补上默认色
  let idx = 0;
  for (const [name, info] of Object.entries(RUNTIME.areas)) {
    if (!info.color) info.color = pickColor(idx);
    idx++;
  }

  renderHeader();
  renderFilters();
  renderLegend();

  map = new AMap.Map('map', {
    zoom: 12,
    center: RUNTIME.city.center,
    mapStyle: 'amap://styles/normal',
    viewMode: '2D',
  });
  map.addControl(new AMap.Scale({ position: 'LB' }));

  placeSearch = new AMap.PlaceSearch({
    city: RUNTIME.city.amap_city_name,
    citylimit: true,
    pageSize: 1,
  });
  geocoder = new AMap.Geocoder({ city: RUNTIME.city.amap_city_name });

  await resolveWorkLocation();

  // 装载 listings.json（用户真实数据）→ 若失败且是深圳，尝试 sample
  let loaded = await tryLoadListings('listings.json');
  if (!loaded && RUNTIME.city.pinyin === 'shenzhen') {
    console.info('未找到 listings.json，加载深圳示例数据');
    await tryLoadListings('sample-shenzhen.json', { isSample: true });
  }

  updateCount();
}

function renderHeader() {
  const c = RUNTIME.city;
  const p = RUNTIME.profile || {};
  document.getElementById('title').textContent = `${c.name}租房地图`;
  const parts = [];
  if (RUNTIME.work_location.label) parts.push(`工作地: ${RUNTIME.work_location.label}`);
  if (p.budget_max) parts.push(`≤${p.budget_max}元`);
  if (p.type) parts.push(p.type);
  if (p.rooms && p.rooms.length) parts.push(p.rooms.join('/'));
  document.getElementById('subtitle').textContent = parts.join(' · ') || `${c.name}`;
}

function renderFilters() {
  const host = document.getElementById('filters');
  host.innerHTML = '';

  // 全部
  const all = mkChip('all', '全部', '#1d1d1f');
  all.classList.add('active');
  host.appendChild(all);

  // 行政区 + 热门片区（按 area_order 前 10 个）
  const order = (RUNTIME.area_order || []).slice(0, 12);
  for (const name of order) {
    const info = RUNTIME.areas[name];
    host.appendChild(mkChip(name, name, info.color));
  }

  // 预算档：用户 budget_max 的 0.85x
  const bmax = RUNTIME.profile?.budget_max;
  if (bmax) {
    const cap = Math.round(bmax * 0.85 / 1000) * 1000;
    host.appendChild(mkChip(`price:${cap}`, `≤${cap/1000}k`, '#00897b'));
  }

  // 平台
  host.appendChild(mkChip('platform:小红书', '小红书', '#ff2442'));
  host.appendChild(mkChip('platform:豆瓣', '豆瓣', '#2e7d32'));
}

function mkChip(filter, label, activeColor) {
  const el = document.createElement('div');
  el.className = 'chip';
  el.dataset.f = filter;
  el.textContent = label;
  el.style.setProperty('--active-color', activeColor);
  el.onclick = () => doFilter(filter, el);
  return el;
}

function renderLegend() {
  const host = document.getElementById('legend-rows');
  host.innerHTML = '';
  // 工作地
  if (RUNTIME.work_location.label) {
    host.innerHTML += `<div class="leg-row"><span class="leg-dot" style="background:#ff3b30"></span>${escapeHtml(RUNTIME.work_location.label)}</div>`;
  }
  // 取前 8 个片区显示在 legend 里
  const entries = Object.entries(RUNTIME.areas).slice(0, 8);
  for (const [name, info] of entries) {
    host.innerHTML += `<div class="leg-row"><span class="leg-dot" style="background:${info.color}"></span>${escapeHtml(name)}</div>`;
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

async function resolveWorkLocation() {
  const label = RUNTIME.work_location.label;
  if (!label) return;

  // AMap.Geocoder 解析工作地坐标
  const pos = await new Promise(resolve => {
    geocoder.getLocation(label, (status, result) => {
      if (status === 'complete' && result.geocodes && result.geocodes.length > 0) {
        const g = result.geocodes[0];
        resolve([g.location.lng, g.location.lat]);
      } else {
        // 降级：PlaceSearch
        placeSearch.search(label, (ps_status, ps_result) => {
          if (ps_status === 'complete' && ps_result.poiList && ps_result.poiList.pois.length > 0) {
            const poi = ps_result.poiList.pois[0];
            resolve([poi.location.lng, poi.location.lat]);
          } else {
            resolve(null);
          }
        });
      }
    });
  });

  if (!pos) {
    console.warn('工作地解析失败:', label);
    return;
  }
  WORK = pos;
  map.setCenter(WORK);

  new AMap.Marker({
    position: WORK, offset: new AMap.Pixel(-18, -18),
    content: '<div class="work-wrap"><div class="work-pulse"></div><div class="work-core">🏢</div></div>',
    zIndex: 200,
  }).addTo(map);
}

// ────────────── 标记 ──────────────
function addMarker(l) {
  const areaInfo = RUNTIME.areas[l.area];
  const color = (areaInfo && areaInfo.color) || '#666';
  const hasPrice = l.price && l.price > 0;
  const label = hasPrice ? (l.price/1000).toFixed(1)+'k' : '?';
  const cls = hasPrice ? 'big' : 'sm';
  const pos = l.pos || [l.lng, l.lat];
  if (!pos || pos.length !== 2) return;

  const m = new AMap.Marker({
    position: pos,
    offset: new AMap.Pixel(hasPrice ? -18 : -14, hasPrice ? -18 : -14),
    content: `<div class="m-dot ${cls}" style="background:${color}">${label}</div>`,
    zIndex: hasPrice ? 120 : 100,
  });
  m.on('click', () => openPanel(l));
  m.addTo(map);
  m._data = l;
  markerObjs.push(m);
  return m;
}

// ────────────── 数据加载 ──────────────
async function tryLoadListings(file, opts = {}) {
  try {
    const r = await fetch(file);
    if (!r.ok) return false;
    const data = await r.json();
    if (!Array.isArray(data) || data.length === 0) return false;

    // 先把已有 pos 的直接渲染
    const withPos = data.filter(l => l.pos && l.pos.length === 2);
    const needGeo = data.filter(l => !l.pos && (l.title || l.community));

    withPos.forEach(l => addMarker(l));

    // 对没坐标的房源做 PlaceSearch
    if (needGeo.length) await geocodeListings(needGeo);

    if (opts.isSample) {
      document.getElementById('subtitle').textContent += ' · [示例数据]';
    }
    return true;
  } catch (e) {
    console.warn('加载 ' + file + ' 失败:', e);
    return false;
  }
}

function extractSearchTerm(item) {
  const text = item.title || '';
  const suffixes = '花园|天城|大厦|中心|公寓|世家|广场|名苑|雅苑|公馆|翠园|家园|华庭|林语|新村|湾畔|峰|峯|苑|阁|庭|台|府|寓|堡|岸|境界|名城|城邦|名府|壹号';
  const re = new RegExp(`([\\u4e00-\\u9fff]{2,6}(?:${suffixes}))`, 'g');
  const matches = text.match(re);
  const cityName = RUNTIME.city.name;
  if (matches) {
    const bad = new Set(['酒店式公寓','花园小区','花园社区','老小区']);
    const good = matches.find(m => !bad.has(m));
    if (good) return cityName + good;
  }
  const area = item.area || '';
  const metroMatch = text.match(/([\u4e00-\u9fff]{2,4}(?:地铁站|站旁|路))/);
  if (metroMatch) return cityName + metroMatch[1];
  return cityName + area;
}

async function geocodeListings(items) {
  const statusEl = document.getElementById('geo-status');
  let done = 0;
  const total = items.length;

  for (const item of items) {
    const searchTerm = extractSearchTerm(item);
    statusEl.textContent = `定位中 ${done}/${total}: ${searchTerm}`;
    try {
      const pos = await new Promise(resolve => {
        placeSearch.search(searchTerm, (status, result) => {
          if (status === 'complete' && result.poiList && result.poiList.pois.length > 0) {
            const poi = result.poiList.pois[0];
            resolve([poi.location.lng, poi.location.lat]);
          } else {
            resolve(null);
          }
        });
      });

      const listing = {
        name: item.community || (item.title || '').slice(0, 12),
        platform: item.platform,
        area: item.area,
        pos: pos || areaFallback(item.area),
        price: item.price || null,
        rooms: item.room || item.rooms,
        size: item.size || null,
        metro: item.metro || null,
        desc: item.title || item.desc,
        url: item.url,
        rec: false,
        geocoded: !!pos,
      };
      addMarker(listing);
    } catch(e) {
      console.warn('Geocode error:', searchTerm, e);
    }
    done++;
    await sleep(150);
  }

  statusEl.textContent = `定位完成: ${markerObjs.length} 套`;
  setTimeout(() => statusEl.textContent = '', 3000);
  updateCount();
}

function areaFallback(area) {
  const info = RUNTIME.areas[area];
  const base = (info && info.pos) || RUNTIME.city.center;
  return [base[0] + (Math.random()-0.5)*0.006, base[1] + (Math.random()-0.5)*0.004];
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function updateCount() {
  document.getElementById('count-pill').textContent = markerObjs.length + ' 套';
}

// ────────────── 详情面板 ──────────────
function openPanel(l) {
  const pos = l.pos;
  const distTxt = WORK ? fmtDist(distKm(WORK, pos)) : null;
  const priceHtml = l.price
    ? `<div class="panel-price">${l.price.toLocaleString()}<span class="unit"> 元/月</span></div>`
    : `<div class="panel-tba">价格待询</div>`;

  const tags = [
    l.rooms ? `<span class="ptag">${escapeHtml(l.rooms)}</span>` : '',
    l.size ? `<span class="ptag">${escapeHtml(l.size)}</span>` : '',
    l.metro ? `<span class="ptag">${escapeHtml(l.metro)}</span>` : '',
    l.direct ? `<span class="ptag direct">🏠 房东直租</span>` : '',
  ].join('');

  const btn = l.url
    ? `<a class="panel-btn" href="${l.url}" target="_blank">查看原帖 →</a>`
    : `<a class="panel-btn disabled">暂无链接（${escapeHtml(l.platform || '')}）</a>`;

  const distBlock = distTxt
    ? `<div class="panel-dist">📍 距${escapeHtml(RUNTIME.work_location.label || '工作地')}（直线）<b>${distTxt}</b></div>`
    : '';

  const platformClass = (l.platform || '').replace(/[^\u4e00-\u9fff\w]/g, '');

  document.getElementById('panel-body').innerHTML = `
    <div>
      <span class="panel-badge pb-${platformClass}">${escapeHtml(l.platform || '未知')}</span>
      ${l.rec ? '<span class="panel-rec">推荐</span>' : ''}
      ${l.geocoded === false ? '<span style="font-size:11px;color:#999;margin-left:4px">大致位置</span>' : ''}
    </div>
    <div class="panel-name">${escapeHtml(l.name || '未命名')}</div>
    ${priceHtml}
    <div class="panel-tags">${tags}</div>
    <div class="panel-desc">${escapeHtml(l.desc || '')}</div>
    ${distBlock}
    ${btn}
  `;
  document.getElementById('panel').classList.add('open');
  map.panTo(pos);
}

function fmtDist(km) {
  return km < 1 ? `约 ${Math.round(km*1000)} m` : `约 ${km.toFixed(1)} km`;
}

function closePanel() { document.getElementById('panel').classList.remove('open'); }

function doFilter(f, el) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  // 激活色：用 chip 自己的 dataset 颜色
  const color = el.style.getPropertyValue('--active-color');
  if (color) el.style.background = color;
  closePanel();

  let count = 0;
  markerObjs.forEach(m => {
    const l = m._data;
    let show = false;
    if (f === 'all') show = true;
    else if (f.startsWith('price:')) {
      const cap = parseInt(f.slice(6), 10);
      show = l.price && l.price <= cap;
    } else if (f.startsWith('platform:')) {
      show = l.platform === f.slice(9);
    } else {
      // 片区名匹配（精确 + 包含父区）
      const info = RUNTIME.areas[f];
      show = l.area === f || (info && l.area && RUNTIME.areas[l.area]?.parent === f);
    }
    if (show) { m.show(); count++; } else m.hide();
  });
  document.getElementById('count-pill').textContent = count + ' 套';
}

// chip 激活色：用 CSS var
const styleEl = document.createElement('style');
styleEl.textContent = `.chip.active { background: var(--active-color, #1d1d1f); }`;
document.head.appendChild(styleEl);

window.addEventListener('load', boot);
</script>
</body>
